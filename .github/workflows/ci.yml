name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Typecheck
        run: |
          docker compose build
          docker compose run --rm --entrypoint bash clasp -c 'npx tsc --noEmit'
